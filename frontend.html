<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PDF Tab Builder</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";</script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #e2e8f0; }
  #root { min-height: 100vh; display: flex; flex-direction: column; }

  /* Top bar */
  .topbar { background: #1e293b; border-bottom: 1px solid #334155; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; position: sticky; top: 0; z-index: 10; }
  .brand { font-weight: 700; font-size: 16px; color: #f1f5f9; display: flex; align-items: center; gap: 8px; }
  .brand-badge { background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: white; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 600; letter-spacing: 0.5px; }

  .stats-strip { display: flex; gap: 14px; font-size: 13px; color: #94a3b8; flex-wrap: wrap; }
  .stat-pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; background: #0f172a; border: 1px solid #334155; border-radius: 999px; }
  .stat-dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-pending { background: #64748b; }
  .dot-configured { background: #eab308; }
  .dot-processed { background: #10b981; }
  .dot-error { background: #ef4444; }
  .dot-skipped { background: #9ca3af; }

  button { font-family: inherit; cursor: pointer; border-radius: 8px; font-weight: 500; transition: all 0.15s; border: none; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; padding: 9px 16px; font-size: 13px; box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3); }
  .btn-primary:hover:not(:disabled) { box-shadow: 0 4px 12px rgba(59, 130, 246, 0.5); transform: translateY(-1px); }
  .btn-secondary { background: #334155; color: #e2e8f0; padding: 9px 16px; font-size: 13px; border: 1px solid #475569; }
  .btn-secondary:hover:not(:disabled) { background: #475569; }
  .btn-ghost { background: transparent; color: #94a3b8; padding: 7px 12px; font-size: 13px; }
  .btn-ghost:hover:not(:disabled) { color: #e2e8f0; background: #1e293b; }
  .btn-danger { background: #991b1b; color: white; padding: 9px 16px; font-size: 13px; }
  .btn-danger:hover:not(:disabled) { background: #7f1d1d; }
  .btn-success { background: linear-gradient(135deg, #10b981, #059669); color: white; padding: 9px 16px; font-size: 13px; box-shadow: 0 2px 8px rgba(16, 185, 129, 0.3); }

  .input, .textarea { width: 100%; padding: 9px 12px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; font-size: 13px; color: #e2e8f0; font-family: inherit; }
  .input:focus, .textarea:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); }
  .textarea { min-height: 100px; resize: vertical; font-family: inherit; }
  .label { font-size: 11px; font-weight: 600; color: #94a3b8; margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: 0.5px; }

  /* Upload zone */
  .upload-page { max-width: 720px; margin: 40px auto; padding: 0 20px; }
  .drop-zone { border: 2px dashed #334155; border-radius: 16px; padding: 60px 24px; text-align: center; background: #1e293b; transition: all 0.2s; cursor: pointer; }
  .drop-zone:hover, .drop-zone.dragging { border-color: #3b82f6; background: rgba(59, 130, 246, 0.05); }
  .drop-icon { font-size: 48px; margin-bottom: 12px; }
  .h1 { font-size: 26px; font-weight: 700; color: #f1f5f9; margin: 0 0 6px; }
  .muted { color: #94a3b8; font-size: 13px; }
  .info-box { background: rgba(59, 130, 246, 0.08); border: 1px solid rgba(59, 130, 246, 0.3); color: #bfdbfe; padding: 12px 14px; border-radius: 10px; font-size: 13px; line-height: 1.5; }

  /* File list */
  .file-list-page { max-width: 1200px; margin: 20px auto; padding: 0 20px; width: 100%; }
  .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .search { flex: 1; min-width: 200px; max-width: 360px; position: relative; }
  .search input { padding-left: 34px; }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #64748b; }
  .file-table { background: #1e293b; border: 1px solid #334155; border-radius: 12px; overflow: hidden; }
  .file-row { display: grid; grid-template-columns: 30px 1fr 120px 100px 100px; gap: 10px; align-items: center; padding: 10px 14px; border-bottom: 1px solid #334155; font-size: 13px; cursor: pointer; transition: background 0.1s; }
  .file-row:hover { background: #273449; }
  .file-row:last-child { border-bottom: none; }
  .file-row.selected { background: rgba(59, 130, 246, 0.1); }
  .file-row.header { font-weight: 600; color: #94a3b8; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; cursor: default; background: #0f172a; }
  .file-row.header:hover { background: #0f172a; }
  .file-icon { font-size: 16px; }
  .filename { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #e2e8f0; }
  .file-pages { color: #64748b; font-size: 12px; }

  .chip { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 500; border: 1px solid; }
  .chip-pending { background: rgba(100, 116, 139, 0.15); color: #94a3b8; border-color: #475569; }
  .chip-configured { background: rgba(234, 179, 8, 0.15); color: #fde047; border-color: #713f12; }
  .chip-processed { background: rgba(16, 185, 129, 0.15); color: #6ee7b7; border-color: #065f46; }
  .chip-error { background: rgba(239, 68, 68, 0.15); color: #fca5a5; border-color: #7f1d1d; }
  .chip-skipped { background: rgba(156, 163, 175, 0.15); color: #9ca3af; border-color: #374151; }

  /* Editor */
  .editor-page { display: flex; flex-direction: column; height: calc(100vh - 61px); }
  .editor-header { background: #1e293b; border-bottom: 1px solid #334155; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .editor-main { flex: 1; display: flex; overflow: hidden; }
  .editor-preview { flex: 1; overflow: auto; padding: 20px; background: #020617; display: flex; justify-content: center; align-items: flex-start; }
  .editor-sidebar { width: 340px; background: #1e293b; border-left: 1px solid #334155; overflow-y: auto; padding: 16px; flex-shrink: 0; }
  .pdf-stage { position: relative; background: white; border-radius: 4px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4); }
  .pdf-canvas { display: block; cursor: crosshair; border-radius: 4px; }
  .overlay { position: absolute; pointer-events: none; border: 2px solid #3b82f6; background: rgba(59, 130, 246, 0.15); border-radius: 3px; box-shadow: 0 0 0 1px white; }
  .overlay.panel { border-style: dashed; border-color: #8b5cf6; background: rgba(139, 92, 246, 0.1); }
  .overlay-label { position: absolute; top: -22px; left: 0; background: #3b82f6; color: white; font-size: 10px; padding: 2px 6px; border-radius: 3px; white-space: nowrap; font-weight: 600; }
  .overlay.panel .overlay-label { background: #8b5cf6; }

  .preset-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; aspect-ratio: 5/3.5; }
  .preset-cell { background: #0f172a; border: 1px solid #334155; border-radius: 4px; cursor: pointer; transition: all 0.1s; display: flex; align-items: center; justify-content: center; color: #64748b; font-size: 10px; font-weight: 600; }
  .preset-cell:hover { background: #1e293b; color: #e2e8f0; }
  .preset-cell.active { background: linear-gradient(135deg, #3b82f6, #8b5cf6); border-color: #3b82f6; color: white; }

  .section { margin-bottom: 16px; }
  .section-title { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }

  .kbd { display: inline-block; padding: 1px 6px; background: #0f172a; border: 1px solid #334155; border-radius: 4px; font-family: ui-monospace, monospace; font-size: 10px; color: #94a3b8; }

  .progress-bar { height: 4px; background: #334155; border-radius: 999px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #8b5cf6); transition: width 0.3s; }

  .template-item { padding: 8px 10px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; font-size: 12px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; gap: 6px; }
  .template-item .tpl-apply { cursor: pointer; color: #60a5fa; flex: 1; }
  .template-item .tpl-apply:hover { color: #93c5fd; }

  .toast { position: fixed; bottom: 20px; right: 20px; background: #1e293b; border: 1px solid #334155; color: #e2e8f0; padding: 12px 18px; border-radius: 10px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5); font-size: 13px; z-index: 1000; animation: slideIn 0.2s; }
  @keyframes slideIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #334155; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .shortcut-hint { font-size: 11px; color: #64748b; margin-top: 6px; }

  .modal-bg { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; max-width: 500px; width: 90%; }

  @media (max-width: 900px) {
    .editor-main { flex-direction: column; }
    .editor-sidebar { width: 100%; border-left: none; border-top: 1px solid #334155; max-height: 50vh; }
    .file-row { grid-template-columns: 30px 1fr 80px 80px; }
    .file-row > :nth-child(4) { display: none; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// =========================================================================
// API
// =========================================================================
const API = "";
const api = {
  upload: async (files) => {
    const fd = new FormData();
    for (const f of files) fd.append("files", f);
    const r = await fetch(`${API}/api/files/upload`, { method: "POST", body: fd });
    if (!r.ok) throw new Error(`Upload failed: ${r.status}`);
    return r.json();
  },
  list: async (params = {}) => {
    const qs = new URLSearchParams(Object.fromEntries(Object.entries(params).filter(([_, v]) => v))).toString();
    const r = await fetch(`${API}/api/files${qs ? "?" + qs : ""}`);
    return r.json();
  },
  stats: async () => (await fetch(`${API}/api/files/stats`)).json(),
  get: async (id) => (await fetch(`${API}/api/files/${id}`)).json(),
  updateConfig: async (id, cfg) => {
    const r = await fetch(`${API}/api/files/${id}/config`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(cfg),
    });
    return r.json();
  },
  skip: async (id, skip = true) => {
    const r = await fetch(`${API}/api/files/${id}/skip`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ skip }),
    });
    return r.json();
  },
  delete: async (id) => fetch(`${API}/api/files/${id}`, { method: "DELETE" }),
  bulkApply: async (fileIds, config) => {
    const r = await fetch(`${API}/api/files/bulk-apply`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ file_ids: fileIds, config }),
    });
    return r.json();
  },
  bulkDelete: async (fileIds) => {
    const r = await fetch(`${API}/api/files/bulk-delete`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ file_ids: fileIds, config: {} }),
    });
    return r.json();
  },
  listTemplates: async () => (await fetch(`${API}/api/templates`)).json(),
  createTemplate: async (name, config) => {
    const r = await fetch(`${API}/api/templates`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, config }),
    });
    return r.json();
  },
  deleteTemplate: async (id) => fetch(`${API}/api/templates/${id}`, { method: "DELETE" }),
  reset: async () => fetch(`${API}/api/reset`, { method: "POST" }),
  previewUrl: (id) => `${API}/api/files/${id}/preview`,
  downloadUrl: (id) => `${API}/api/files/${id}/download`,
  downloadAllUrl: () => `${API}/api/download-all`,
};

// =========================================================================
// Layout math (must mirror backend exactly)
// =========================================================================
function computeLayout(clickX, clickY, pageW, pageH, panelHHint = 140) {
  const tabW = Math.min(220, pageW - 40);
  const tabH = 36;
  const panelW = Math.min(pageW - 40, 500);
  const panelH = Math.min(panelHHint, pageH - tabH - 60);
  let tabX = clickX - tabW / 2, tabY = clickY - tabH / 2;
  tabX = Math.max(20, Math.min(pageW - tabW - 20, tabX));
  tabY = Math.max(20, Math.min(pageH - tabH - 20, tabY));
  let panelX = tabX + tabW / 2 - panelW / 2;
  panelX = Math.max(20, Math.min(pageW - panelW - 20, panelX));
  let panelY = tabY + tabH + 10;
  if (panelY + panelH > pageH - 20) panelY = Math.max(20, tabY - panelH - 10);
  return { tabX, tabY, tabW, tabH, panelX, panelY, panelW, panelH };
}

const PRESETS = ["TL","TC","TR","CL","CC","CR","BL","BC","BR"];
function presetToClick(preset, W, H) {
  const xs = { L: 120, C: W / 2, R: W - 120 };
  const ys = { T: H - 60, C: H / 2, B: 60 };
  return { x: xs[preset[1]], y: ys[preset[0]] };
}

// =========================================================================
// Toast helper
// =========================================================================
const ToastContext = React.createContext(() => {});
function ToastProvider({ children }) {
  const [toast, setToast] = useState(null);
  const show = useCallback((msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2200);
  }, []);
  return (
    <ToastContext.Provider value={show}>
      {children}
      {toast && <div className="toast">{toast}</div>}
    </ToastContext.Provider>
  );
}
const useToast = () => React.useContext(ToastContext);

// =========================================================================
// PDF Canvas with overlay
// =========================================================================
function PdfCanvas({ fileId, pageIndex, onPageInfo, onClick, tabClick, config }) {
  const canvasRef = useRef(null);
  const [dims, setDims] = useState({ w: 0, h: 0, pdfW: 0, pdfH: 0, scale: 1 });
  const [loading, setLoading] = useState(true);
  const renderTaskRef = useRef(null);
  const docRef = useRef(null);

  useEffect(() => {
    if (!fileId) return;
    let cancelled = false;
    setLoading(true);
    (async () => {
      try {
        const task = pdfjsLib.getDocument(api.previewUrl(fileId));
        const pdf = await task.promise;
        if (cancelled) return;
        docRef.current = pdf;
        onPageInfo && onPageInfo({ numPages: pdf.numPages });
      } catch (e) { console.error(e); }
    })();
    return () => { cancelled = true; };
  }, [fileId]);

  useEffect(() => {
    if (!docRef.current) return;
    let cancelled = false;
    (async () => {
      try {
        const pdf = docRef.current;
        const idx = Math.min(pageIndex, pdf.numPages - 1);
        const page = await pdf.getPage(idx + 1);
        if (cancelled) return;
        const baseViewport = page.getViewport({ scale: 1 });
        const containerW = canvasRef.current?.parentElement?.clientWidth || 800;
        const targetW = Math.min(900, containerW - 4);
        const fitScale = targetW / baseViewport.width;
        const viewport = page.getViewport({ scale: fitScale });
        const canvas = canvasRef.current;
        if (!canvas) return;
        const dpr = window.devicePixelRatio || 1;
        canvas.width = viewport.width * dpr;
        canvas.height = viewport.height * dpr;
        canvas.style.width = viewport.width + "px";
        canvas.style.height = viewport.height + "px";
        const ctx = canvas.getContext("2d");
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        if (renderTaskRef.current) { try { renderTaskRef.current.cancel(); } catch {} }
        const rt = page.render({ canvasContext: ctx, viewport });
        renderTaskRef.current = rt;
        await rt.promise;
        if (cancelled) return;
        setDims({ w: viewport.width, h: viewport.height, pdfW: baseViewport.width, pdfH: baseViewport.height, scale: fitScale });
        setLoading(false);
      } catch (e) {
        if (e.name !== "RenderingCancelledException") console.error(e);
      }
    })();
  }, [fileId, pageIndex, docRef.current]);

  const handleClick = (e) => {
    if (!canvasRef.current || !dims.scale) return;
    const rect = canvasRef.current.getBoundingClientRect();
    const cx = e.clientX - rect.left;
    const cy = e.clientY - rect.top;
    const pdfX = cx / dims.scale;
    const pdfY = (dims.h - cy) / dims.scale;
    onClick && onClick({ x: pdfX, y: pdfY });
  };

  let overlay = null;
  if (tabClick && dims.pdfW) {
    const layout = computeLayout(tabClick.x, tabClick.y, dims.pdfW, dims.pdfH);
    const toCss = (r) => ({
      left: r.x * dims.scale,
      top: (dims.pdfH - (r.y + r.h)) * dims.scale,
      width: r.w * dims.scale,
      height: r.h * dims.scale,
    });
    const tabCss = toCss({ x: layout.tabX, y: layout.tabY, w: layout.tabW, h: layout.tabH });
    const panelCss = toCss({ x: layout.panelX, y: layout.panelY, w: layout.panelW, h: layout.panelH });
    overlay = (
      <>
        <div className="overlay panel" style={panelCss}>
          <div className="overlay-label">Hidden panel</div>
        </div>
        <div className="overlay" style={tabCss}>
          <div className="overlay-label">Tab</div>
        </div>
      </>
    );
  }

  return (
    <div className="pdf-stage">
      <canvas ref={canvasRef} className="pdf-canvas" onClick={handleClick} />
      {loading && (
        <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", background: "rgba(255,255,255,0.9)", borderRadius: 4 }}>
          <div className="spinner" />
        </div>
      )}
      {overlay}
    </div>
  );
}

// =========================================================================
// Upload Screen
// =========================================================================
function UploadScreen({ onUploaded }) {
  const [dragging, setDragging] = useState(false);
  const [uploading, setUploading] = useState(false);
  const [progress, setProgress] = useState({ done: 0, total: 0 });
  const inputRef = useRef(null);
  const toast = useToast();

  const doUpload = async (fileList) => {
    const files = Array.from(fileList).filter(f => /\.(pdf|docx)$/i.test(f.name));
    if (!files.length) { toast("No PDF or DOCX files found"); return; }
    setUploading(true);
    setProgress({ done: 0, total: files.length });
    // Upload in batches of 10 to avoid huge single requests
    const BATCH = 10;
    for (let i = 0; i < files.length; i += BATCH) {
      const batch = files.slice(i, i + BATCH);
      try {
        await api.upload(batch);
      } catch (e) { console.error(e); toast("Batch upload error"); }
      setProgress({ done: Math.min(i + BATCH, files.length), total: files.length });
    }
    setUploading(false);
    toast(`Uploaded ${files.length} file${files.length === 1 ? "" : "s"}`);
    onUploaded();
  };

  return (
    <div className="upload-page">
      <h1 className="h1">Upload documents</h1>
      <p className="muted" style={{ marginBottom: 24 }}>
        Drop PDFs and Word docs. DOCX files are converted to PDF on the server with full formatting preserved.
      </p>

      <div
        className={"drop-zone" + (dragging ? " dragging" : "")}
        onClick={() => !uploading && inputRef.current.click()}
        onDragOver={(e) => { e.preventDefault(); setDragging(true); }}
        onDragLeave={() => setDragging(false)}
        onDrop={(e) => { e.preventDefault(); setDragging(false); doUpload(e.dataTransfer.files); }}
      >
        {uploading ? (
          <>
            <div className="drop-icon"><div className="spinner" style={{ width: 32, height: 32 }} /></div>
            <div style={{ fontWeight: 600, marginBottom: 8 }}>Uploading... {progress.done} / {progress.total}</div>
            <div className="progress-bar" style={{ maxWidth: 400, margin: "0 auto" }}>
              <div className="progress-fill" style={{ width: (progress.done / progress.total * 100) + "%" }} />
            </div>
          </>
        ) : (
          <>
            <div className="drop-icon">📄</div>
            <div style={{ fontWeight: 600, fontSize: 16, marginBottom: 6, color: "#f1f5f9" }}>
              Drop files or click to browse
            </div>
            <div className="muted">PDF and DOCX · Handles 900+ files · Uploads in batches</div>
          </>
        )}
        <input
          ref={inputRef}
          type="file"
          multiple
          accept=".pdf,.docx"
          style={{ display: "none" }}
          onChange={(e) => doUpload(e.target.files)}
        />
      </div>

      <div className="info-box" style={{ marginTop: 20 }}>
        <b>Keyboard power:</b> In the editor, use <span className="kbd">1</span>–<span className="kbd">9</span> for position presets,
        <span className="kbd"> Enter</span> to save and advance, <span className="kbd">→</span> / <span className="kbd">←</span> to navigate,
        <span className="kbd"> S</span> to skip, <span className="kbd">T</span> to focus tab label, <span className="kbd">H</span> for hidden text.
      </div>
    </div>
  );
}

// =========================================================================
// File List Screen
// =========================================================================
function StatsStrip({ stats }) {
  if (!stats) return null;
  const by = stats.by_status || {};
  return (
    <div className="stats-strip">
      <div className="stat-pill"><b>{stats.total || 0}</b> total</div>
      <div className="stat-pill"><span className="stat-dot dot-pending"/> {by.pending || 0} pending</div>
      <div className="stat-pill"><span className="stat-dot dot-configured"/> {by.configured || 0} processing</div>
      <div className="stat-pill"><span className="stat-dot dot-processed"/> {by.processed || 0} done</div>
      {by.error ? <div className="stat-pill"><span className="stat-dot dot-error"/> {by.error} error</div> : null}
      {by.skipped ? <div className="stat-pill"><span className="stat-dot dot-skipped"/> {by.skipped} skipped</div> : null}
    </div>
  );
}

function FileListScreen({ files, stats, onEdit, onRefresh, onUpload, onBulkDelete, onResetAll }) {
  const [search, setSearch] = useState("");
  const [statusFilter, setStatusFilter] = useState("");
  const [selected, setSelected] = useState(new Set());
  const toast = useToast();

  const filtered = useMemo(() => {
    return files.filter(f => {
      if (search && !f.original_name.toLowerCase().includes(search.toLowerCase())) return false;
      if (statusFilter && f.status !== statusFilter) return false;
      return true;
    });
  }, [files, search, statusFilter]);

  const firstPending = files.findIndex(f => f.status === "pending" || f.status === "configured");
  const toggleSelect = (id) => setSelected(prev => {
    const next = new Set(prev);
    if (next.has(id)) next.delete(id); else next.add(id);
    return next;
  });
  const selectAll = () => setSelected(new Set(filtered.map(f => f.id)));
  const clearSelection = () => setSelected(new Set());

  const handleBulkDelete = async () => {
    if (!selected.size) return;
    if (!confirm(`Delete ${selected.size} files?`)) return;
    await onBulkDelete(Array.from(selected));
    clearSelection();
  };

  const downloadAll = () => { window.location.href = api.downloadAllUrl(); };

  return (
    <div className="file-list-page">
      <div style={{ marginBottom: 16 }}>
        <StatsStrip stats={stats} />
      </div>

      <div className="toolbar">
        <div className="search">
          <span className="search-icon">🔍</span>
          <input className="input" placeholder="Search filename..." value={search} onChange={e => setSearch(e.target.value)} />
        </div>
        <select className="input" style={{ width: 150 }} value={statusFilter} onChange={e => setStatusFilter(e.target.value)}>
          <option value="">All statuses</option>
          <option value="pending">Pending</option>
          <option value="configured">Processing</option>
          <option value="processed">Done</option>
          <option value="error">Error</option>
          <option value="skipped">Skipped</option>
        </select>
        <div style={{ flex: 1 }} />
        <button className="btn-secondary" onClick={onUpload}>+ Add files</button>
        {firstPending >= 0 && (
          <button className="btn-primary" onClick={() => onEdit(files[firstPending].id)}>
            {stats?.by_status?.processed > 0 ? "Continue →" : "Start →"}
          </button>
        )}
        {(stats?.by_status?.processed || 0) > 0 && (
          <button className="btn-success" onClick={downloadAll}>
            ⬇ Download {stats.by_status.processed} done
          </button>
        )}
      </div>

      {selected.size > 0 && (
        <div className="toolbar" style={{ background: "rgba(59, 130, 246, 0.1)", padding: 10, borderRadius: 8, border: "1px solid rgba(59, 130, 246, 0.3)" }}>
          <span style={{ fontSize: 13 }}><b>{selected.size}</b> selected</span>
          <button className="btn-ghost" onClick={clearSelection}>Clear</button>
          <div style={{ flex: 1 }} />
          <button className="btn-danger" onClick={handleBulkDelete}>Delete selected</button>
        </div>
      )}

      {files.length === 0 ? (
        <div className="info-box" style={{ textAlign: "center", padding: 40 }}>
          No files yet. <button className="btn-primary" style={{ marginLeft: 8 }} onClick={onUpload}>Upload some</button>
        </div>
      ) : (
        <div className="file-table">
          <div className="file-row header">
            <input type="checkbox" checked={selected.size === filtered.length && filtered.length > 0} onChange={selected.size === filtered.length ? clearSelection : selectAll} />
            <div>Name</div>
            <div>Status</div>
            <div>Pages</div>
            <div>Actions</div>
          </div>
          {filtered.map(f => (
            <div
              key={f.id}
              className={"file-row" + (selected.has(f.id) ? " selected" : "")}
              onClick={(e) => {
                if (e.target.tagName === "INPUT" || e.target.tagName === "BUTTON" || e.target.tagName === "A") return;
                onEdit(f.id);
              }}
            >
              <input type="checkbox" checked={selected.has(f.id)} onChange={() => toggleSelect(f.id)} onClick={e => e.stopPropagation()} />
              <div className="filename" title={f.original_name}>
                <span style={{ marginRight: 6 }}>{f.kind === "docx" ? "📝" : "📄"}</span>
                {f.original_name}
              </div>
              <div><span className={"chip chip-" + f.status}>{f.status}</span></div>
              <div className="file-pages">{f.page_count}</div>
              <div style={{ display: "flex", gap: 4 }}>
                <button className="btn-ghost" style={{ padding: "4px 8px", fontSize: 11 }} onClick={(e) => { e.stopPropagation(); onEdit(f.id); }}>Edit</button>
                {f.has_processed && (
                  <a href={api.downloadUrl(f.id)} className="btn-ghost" style={{ padding: "4px 8px", fontSize: 11, textDecoration: "none" }} onClick={e => e.stopPropagation()}>⬇</a>
                )}
              </div>
            </div>
          ))}
        </div>
      )}

      <div style={{ marginTop: 20, display: "flex", justifyContent: "flex-end" }}>
        <button className="btn-ghost" style={{ color: "#991b1b" }} onClick={onResetAll}>Reset everything</button>
      </div>
    </div>
  );
}

// =========================================================================
// Editor Screen
// =========================================================================
function EditorScreen({ files, currentId, onNavigate, onBack, onRefresh, templates, onTemplatesChanged }) {
  const toast = useToast();
  const [file, setFile] = useState(null);
  const [cfg, setCfg] = useState(null);
  const [pageInfo, setPageInfo] = useState({ numPages: 1 });
  const [saving, setSaving] = useState(false);
  const labelRef = useRef(null);
  const textRef = useRef(null);

  const currentIdx = files.findIndex(f => f.id === currentId);
  const total = files.length;

  useEffect(() => {
    if (!currentId) return;
    let cancelled = false;
    api.get(currentId).then(f => {
      if (cancelled) return;
      setFile(f);
      setCfg(f.config || { page_index: 0, click_x: null, click_y: null, tab_label: "Show details", hidden_text: "" });
    });
    return () => { cancelled = true; };
  }, [currentId]);

  const pageW = file?.page_sizes?.[cfg?.page_index || 0]?.[0] || 612;
  const pageH = file?.page_sizes?.[cfg?.page_index || 0]?.[1] || 792;

  const updateCfg = (patch) => setCfg(prev => ({ ...prev, ...patch }));

  const saveAndNext = async (advance = true) => {
    if (!cfg || cfg.click_x == null) { toast("Click on the PDF to place the tab first"); return; }
    setSaving(true);
    try {
      await api.updateConfig(currentId, cfg);
      onRefresh();
      if (advance) {
        const next = files[currentIdx + 1];
        if (next) onNavigate(next.id);
        else { toast("All done — back to list"); onBack(); }
      } else {
        toast("Saved");
      }
    } catch (e) {
      toast("Save failed: " + e.message);
    } finally {
      setSaving(false);
    }
  };

  const skip = async () => {
    await api.skip(currentId, true);
    onRefresh();
    const next = files[currentIdx + 1];
    if (next) onNavigate(next.id); else onBack();
  };

  const applyPreset = (preset) => {
    const { x, y } = presetToClick(preset, pageW, pageH);
    updateCfg({ click_x: x, click_y: y });
  };

  const copyFromPrev = () => {
    const prev = files[currentIdx - 1];
    if (prev && prev.config) {
      const { page_index, ...rest } = prev.config;
      updateCfg({ ...rest, page_index: 0 });
      toast("Copied from previous");
    }
  };

  const saveAsTemplate = async () => {
    const name = prompt("Template name:");
    if (!name) return;
    await api.createTemplate(name, cfg);
    onTemplatesChanged();
    toast("Template saved");
  };

  const applyTemplate = (tpl) => {
    const { page_index, ...rest } = tpl.config;
    updateCfg({ ...rest });
    toast("Applied: " + tpl.name);
  };

  // Keyboard shortcuts
  useEffect(() => {
    const handler = (e) => {
      const tag = document.activeElement?.tagName;
      const inInput = tag === "INPUT" || tag === "TEXTAREA";
      if (e.key === "Escape") { onBack(); return; }
      if (inInput) return;
      if (e.key === "Enter") { e.preventDefault(); saveAndNext(true); }
      else if (e.key === "ArrowRight" && !e.shiftKey) { const n = files[currentIdx + 1]; if (n) onNavigate(n.id); }
      else if (e.key === "ArrowLeft" && !e.shiftKey) { const p = files[currentIdx - 1]; if (p) onNavigate(p.id); }
      else if (e.key >= "1" && e.key <= "9") { applyPreset(PRESETS[parseInt(e.key) - 1]); }
      else if (e.key === "s" || e.key === "S") skip();
      else if (e.key === "t" || e.key === "T") { e.preventDefault(); labelRef.current?.focus(); labelRef.current?.select(); }
      else if (e.key === "h" || e.key === "H") { e.preventDefault(); textRef.current?.focus(); }
      else if (e.key === "c" || e.key === "C") { copyFromPrev(); }
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, [currentIdx, files, cfg, saving]);

  if (!file || !cfg) {
    return <div style={{ padding: 60, textAlign: "center" }}><div className="spinner" /></div>;
  }

  const progressPct = files.filter(f => f.status === "processed").length / total * 100;

  return (
    <div className="editor-page">
      <div className="editor-header">
        <button className="btn-ghost" onClick={onBack}>← List</button>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 13, fontWeight: 600, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }} title={file.original_name}>
            {currentIdx + 1} / {total} · {file.original_name}
          </div>
          <div className="progress-bar" style={{ marginTop: 4 }}>
            <div className="progress-fill" style={{ width: progressPct + "%" }} />
          </div>
        </div>
        <div style={{ display: "flex", gap: 4 }}>
          <button className="btn-ghost" onClick={() => { const p = files[currentIdx - 1]; if (p) onNavigate(p.id); }} disabled={currentIdx === 0}>←</button>
          <button className="btn-ghost" onClick={() => { const n = files[currentIdx + 1]; if (n) onNavigate(n.id); }} disabled={currentIdx >= total - 1}>→</button>
        </div>
      </div>

      <div className="editor-main">
        <div className="editor-preview">
          <PdfCanvas
            fileId={file.id}
            pageIndex={cfg.page_index || 0}
            onPageInfo={setPageInfo}
            onClick={({ x, y }) => updateCfg({ click_x: x, click_y: y })}
            tabClick={cfg.click_x != null ? { x: cfg.click_x, y: cfg.click_y } : null}
            config={cfg}
          />
        </div>

        <div className="editor-sidebar">
          {pageInfo.numPages > 1 && (
            <div className="section">
              <div className="label">Page</div>
              <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                <button className="btn-ghost" onClick={() => updateCfg({ page_index: Math.max(0, (cfg.page_index || 0) - 1) })} disabled={(cfg.page_index || 0) === 0}>◀</button>
                <div style={{ flex: 1, textAlign: "center", fontSize: 13 }}>{(cfg.page_index || 0) + 1} / {pageInfo.numPages}</div>
                <button className="btn-ghost" onClick={() => updateCfg({ page_index: Math.min(pageInfo.numPages - 1, (cfg.page_index || 0) + 1) })} disabled={(cfg.page_index || 0) >= pageInfo.numPages - 1}>▶</button>
              </div>
            </div>
          )}

          <div className="section">
            <div className="label">Position <span style={{ fontWeight: 400, textTransform: "none" }}>(keys <span className="kbd">1</span>–<span className="kbd">9</span>)</span></div>
            <div className="preset-grid">
              {PRESETS.map((p, i) => {
                const isActive = cfg.click_x != null && (() => {
                  const { x, y } = presetToClick(p, pageW, pageH);
                  return Math.abs(cfg.click_x - x) < 1 && Math.abs(cfg.click_y - y) < 1;
                })();
                return (
                  <div key={p} className={"preset-cell" + (isActive ? " active" : "")} onClick={() => applyPreset(p)}>{i + 1}</div>
                );
              })}
            </div>
            <div className="shortcut-hint">Or click directly on the PDF</div>
          </div>

          <div className="section">
            <label className="label">Tab label <span className="kbd">T</span></label>
            <input ref={labelRef} className="input" value={cfg.tab_label} onChange={e => updateCfg({ tab_label: e.target.value })} />
          </div>

          <div className="section">
            <label className="label">Hidden text <span className="kbd">H</span></label>
            <textarea ref={textRef} className="textarea" value={cfg.hidden_text} onChange={e => updateCfg({ hidden_text: e.target.value })} placeholder="Text revealed when tab is clicked..." />
          </div>

          <div className="section" style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            <button className="btn-primary" onClick={() => saveAndNext(true)} disabled={saving || cfg.click_x == null}>
              {saving ? "Saving..." : "Save & next"} <span className="kbd" style={{ marginLeft: 4 }}>↵</span>
            </button>
            <div style={{ display: "flex", gap: 4 }}>
              <button className="btn-secondary" style={{ flex: 1 }} onClick={() => saveAndNext(false)} disabled={saving || cfg.click_x == null}>Save only</button>
              <button className="btn-secondary" style={{ flex: 1 }} onClick={skip}>Skip <span className="kbd">S</span></button>
            </div>
            {currentIdx > 0 && (
              <button className="btn-ghost" onClick={copyFromPrev}>↺ Copy from previous <span className="kbd">C</span></button>
            )}
            <button className="btn-ghost" onClick={saveAsTemplate}>💾 Save as template</button>
          </div>

          {templates.length > 0 && (
            <div className="section">
              <div className="section-title">Templates</div>
              {templates.map(t => (
                <div key={t.id} className="template-item">
                  <span className="tpl-apply" onClick={() => applyTemplate(t)}>{t.name}</span>
                  <button className="btn-ghost" style={{ padding: "2px 6px", fontSize: 11, color: "#991b1b" }} onClick={async () => { await api.deleteTemplate(t.id); onTemplatesChanged(); }}>✕</button>
                </div>
              ))}
            </div>
          )}

          {file.error_msg && (
            <div className="section">
              <div className="info-box" style={{ background: "rgba(239, 68, 68, 0.08)", borderColor: "rgba(239, 68, 68, 0.3)", color: "#fca5a5" }}>
                <b>Error:</b> {file.error_msg}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// =========================================================================
// App
// =========================================================================
function App() {
  const [phase, setPhase] = useState("list"); // 'upload', 'list', 'editor'
  const [files, setFiles] = useState([]);
  const [stats, setStats] = useState(null);
  const [templates, setTemplates] = useState([]);
  const [currentId, setCurrentId] = useState(null);
  const [loading, setLoading] = useState(true);

  const refresh = useCallback(async () => {
    const [fl, st, tp] = await Promise.all([api.list(), api.stats(), api.listTemplates()]);
    setFiles(fl.files || []);
    setStats(st);
    setTemplates(tp.templates || []);
    setLoading(false);
  }, []);

  useEffect(() => { refresh(); }, []);

  // Poll for status updates on processing files
  useEffect(() => {
    const hasProcessing = files.some(f => f.status === "configured");
    if (!hasProcessing) return;
    const interval = setInterval(refresh, 1500);
    return () => clearInterval(interval);
  }, [files, refresh]);

  useEffect(() => {
    if (!loading && files.length === 0 && phase === "list") setPhase("upload");
  }, [loading, files.length]);

  const goEdit = (id) => { setCurrentId(id); setPhase("editor"); };
  const resetAll = async () => {
    if (!confirm("Delete ALL files, configs, and templates? Cannot be undone.")) return;
    await api.reset();
    await refresh();
    setPhase("upload");
  };

  return (
    <ToastProvider>
      <div className="topbar">
        <div className="brand">
          <span>📎 PDF Tab Builder</span>
          <span className="brand-badge">PRO</span>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          {phase !== "upload" && <button className="btn-ghost" onClick={() => setPhase("upload")}>+ Upload</button>}
          {phase !== "list" && <button className="btn-ghost" onClick={() => setPhase("list")}>📋 Files</button>}
        </div>
      </div>

      {loading ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center" }}>
          <div className="spinner" />
        </div>
      ) : phase === "upload" ? (
        <UploadScreen onUploaded={() => { refresh(); setPhase("list"); }} />
      ) : phase === "list" ? (
        <FileListScreen
          files={files}
          stats={stats}
          onEdit={goEdit}
          onRefresh={refresh}
          onUpload={() => setPhase("upload")}
          onBulkDelete={async (ids) => { await api.bulkDelete(ids); refresh(); }}
          onResetAll={resetAll}
        />
      ) : (
        <EditorScreen
          files={files}
          currentId={currentId}
          onNavigate={setCurrentId}
          onBack={() => { refresh(); setPhase("list"); }}
          onRefresh={refresh}
          templates={templates}
          onTemplatesChanged={refresh}
        />
      )}
    </ToastProvider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
