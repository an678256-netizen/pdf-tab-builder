<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
<title>PDF Tab Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";</script>
<style>
  :root {
    --bg: #faf9f6;
    --bg-card: #ffffff;
    --bg-soft: #f4f2ed;
    --text: #1c1b17;
    --text-muted: #6b6862;
    --text-subtle: #9a9690;
    --border: #e5e2db;
    --border-strong: #d4d0c5;
    --accent: #2563eb;
    --accent-dark: #1d4ed8;
    --accent-soft: #eff6ff;
    --success: #16a34a;
    --success-soft: #f0fdf4;
    --warn: #d97706;
    --danger: #dc2626;
    --serif: 'Fraunces', Georgia, serif;
    --sans: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    --radius: 12px;
    --radius-sm: 8px;
    --radius-lg: 20px;
    --shadow-sm: 0 1px 2px rgba(28, 27, 23, 0.04), 0 1px 3px rgba(28, 27, 23, 0.06);
    --shadow: 0 4px 12px rgba(28, 27, 23, 0.06), 0 2px 4px rgba(28, 27, 23, 0.04);
    --shadow-lg: 0 12px 32px rgba(28, 27, 23, 0.10), 0 4px 8px rgba(28, 27, 23, 0.06);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; min-height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 15px; line-height: 1.5; }
  #root { min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; }

  button { font-family: inherit; cursor: pointer; border: none; border-radius: var(--radius-sm); font-weight: 500; transition: transform 0.1s, box-shadow 0.15s, background 0.15s, color 0.15s; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button:not(:disabled):active { transform: scale(0.98); }

  .btn-primary { background: var(--text); color: var(--bg); padding: 12px 22px; font-size: 15px; font-weight: 600; box-shadow: var(--shadow-sm); }
  .btn-primary:hover:not(:disabled) { background: #000; box-shadow: var(--shadow); }
  .btn-accent { background: var(--accent); color: white; padding: 12px 22px; font-size: 15px; font-weight: 600; box-shadow: var(--shadow-sm); }
  .btn-accent:hover:not(:disabled) { background: var(--accent-dark); box-shadow: var(--shadow); }
  .btn-secondary { background: var(--bg-card); color: var(--text); padding: 11px 20px; font-size: 14px; font-weight: 500; border: 1px solid var(--border-strong); }
  .btn-secondary:hover:not(:disabled) { background: var(--bg-soft); }
  .btn-ghost { background: transparent; color: var(--text-muted); padding: 8px 14px; font-size: 14px; font-weight: 500; }
  .btn-ghost:hover:not(:disabled) { color: var(--text); background: var(--bg-soft); }
  .btn-icon { display: inline-flex; align-items: center; justify-content: center; width: 38px; height: 38px; background: var(--bg-card); color: var(--text); border: 1px solid var(--border); font-size: 16px; border-radius: var(--radius-sm); }
  .btn-icon:hover:not(:disabled) { background: var(--bg-soft); border-color: var(--border-strong); }

  .input, .textarea { width: 100%; padding: 12px 14px; background: var(--bg-card); border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 15px; color: var(--text); font-family: inherit; transition: border-color 0.15s, box-shadow 0.15s; }
  .input:focus, .textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); }
  .textarea { min-height: 110px; resize: vertical; line-height: 1.5; }
  .label { font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; display: block; letter-spacing: -0.005em; }

  .topbar { background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; gap: 16px; position: sticky; top: 0; z-index: 30; }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-mark { width: 32px; height: 32px; border-radius: 8px; background: var(--text); color: var(--bg); display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; font-family: var(--serif); }
  .brand-name { font-family: var(--serif); font-weight: 600; font-size: 19px; letter-spacing: -0.015em; }

  .upload-page { max-width: 680px; margin: 0 auto; padding: 40px 20px; width: 100%; }
  .upload-hero { text-align: center; margin-bottom: 32px; }
  .upload-title { font-family: var(--serif); font-size: 40px; font-weight: 500; letter-spacing: -0.03em; line-height: 1.1; margin: 0 0 12px; }
  .upload-title em { font-style: italic; color: var(--accent); font-weight: 400; }
  .upload-sub { font-size: 17px; color: var(--text-muted); margin: 0; }
  .drop-zone { border: 2px dashed var(--border-strong); border-radius: var(--radius-lg); padding: 56px 24px; text-align: center; background: var(--bg-card); transition: all 0.2s; cursor: pointer; }
  .drop-zone:hover, .drop-zone.dragging { border-color: var(--accent); background: var(--accent-soft); }
  .drop-icon { font-size: 44px; margin-bottom: 12px; }
  .drop-heading { font-weight: 600; font-size: 17px; margin-bottom: 6px; }
  .drop-sub { font-size: 14px; color: var(--text-muted); }
  .help-note { background: var(--bg-soft); border-radius: var(--radius); padding: 16px 18px; font-size: 14px; color: var(--text-muted); line-height: 1.6; margin-top: 24px; }
  .help-note b { color: var(--text); font-weight: 600; }

  .list-page { max-width: 960px; margin: 0 auto; padding: 32px 20px; width: 100%; }
  .list-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; gap: 16px; flex-wrap: wrap; }
  .list-title { font-family: var(--serif); font-size: 32px; font-weight: 500; letter-spacing: -0.02em; margin: 0; }
  .list-count { font-size: 14px; color: var(--text-muted); margin-top: 4px; }
  .stats-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .stat { display: inline-flex; align-items: center; gap: 8px; padding: 8px 14px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 999px; font-size: 13px; font-weight: 500; }
  .stat-dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-pending { background: var(--text-subtle); }
  .dot-processing { background: var(--warn); animation: pulse 1.2s ease-in-out infinite; }
  .dot-done { background: var(--success); }
  .dot-error { background: var(--danger); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .search-wrap { flex: 1; min-width: 200px; max-width: 340px; position: relative; }
  .search-wrap input { padding-left: 40px; }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-subtle); font-size: 14px; pointer-events: none; }
  .file-grid { background: var(--bg-card); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
  .file-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
  .file-row:last-child { border-bottom: none; }
  .file-row:hover { background: var(--bg-soft); }
  .file-row.done { background: var(--success-soft); }
  .file-row.done:hover { background: #e8f8ee; }
  .file-check { width: 22px; height: 22px; border: 2px solid var(--border-strong); border-radius: 6px; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center; background: var(--bg-card); }
  .file-check.checked { background: var(--accent); border-color: var(--accent); color: white; }
  .file-icon { font-size: 20px; flex-shrink: 0; }
  .file-info { flex: 1; min-width: 0; }
  .file-name { font-weight: 500; font-size: 15px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-meta { font-size: 12px; color: var(--text-subtle); margin-top: 2px; }
  .file-status { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 999px; flex-shrink: 0; }
  .status-pending { background: var(--bg-soft); color: var(--text-muted); }
  .status-processing { background: #fef3c7; color: #92400e; }
  .status-done { background: var(--success-soft); color: #15803d; }
  .status-error { background: #fee2e2; color: #991b1b; }
  .status-skipped { background: var(--bg-soft); color: var(--text-subtle); }
  .file-dl-btn { width: 32px; height: 32px; border: 1px solid var(--border-strong); background: var(--bg-card); border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; text-decoration: none; color: var(--text); font-size: 14px; flex-shrink: 0; }
  .file-dl-btn:hover { background: var(--success-soft); border-color: var(--success); color: var(--success); }

  /* === Editor === */
  .editor { display: flex; flex-direction: column; flex: 1; min-height: 0; }
  .editor-top { background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 12px 16px; display: flex; align-items: center; gap: 12px; flex-wrap: nowrap; }
  .editor-file { flex: 1; min-width: 0; }
  .editor-file-name { font-weight: 600; font-size: 15px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .editor-progress { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .progress-thin { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 4px; }
  .progress-thin > div { height: 100%; background: linear-gradient(90deg, var(--accent), #60a5fa); transition: width 0.3s; }

  .editor-body { flex: 1; display: flex; min-height: 0; overflow: hidden; }

  .pdf-area { flex: 1; overflow: auto; background: var(--bg-soft); display: flex; align-items: flex-start; justify-content: center; padding: 20px; position: relative; min-height: 0; -webkit-overflow-scrolling: touch; }
  .pdf-frame { background: white; box-shadow: var(--shadow-lg); border-radius: 4px; position: relative; }
  .pdf-frame canvas { display: block; border-radius: 4px; }
  .pdf-loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.85); border-radius: 4px; z-index: 20; }

  /* Text layer — words overlaid exactly on canvas pixels for hover/click */
  .text-layer { position: absolute; inset: 0; overflow: hidden; line-height: 1; user-select: none; }
  .text-layer span {
    position: absolute;
    color: transparent;
    white-space: pre;
    cursor: pointer;
    transform-origin: 0% 0%;
    border-radius: 2px;
    background: transparent;
    transition: background 0.08s;
  }
  .text-layer span:hover { background: rgba(37, 99, 235, 0.22); color: transparent; }
  .text-layer span.selected { background: rgba(37, 99, 235, 0.32); color: transparent; box-shadow: 0 0 0 1px var(--accent); }

  .instruction-banner { position: absolute; top: 16px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); padding: 10px 18px; border-radius: 999px; font-size: 13px; font-weight: 500; box-shadow: var(--shadow-lg); z-index: 5; animation: slideDown 0.3s ease-out; pointer-events: none; }
  @keyframes slideDown { from { opacity: 0; transform: translate(-50%, -10px); } to { opacity: 1; transform: translate(-50%, 0); } }

  .overlay { position: absolute; pointer-events: none; border-radius: 3px; }
  .overlay-tab { background: var(--accent); border: 1.5px solid white; box-shadow: 0 2px 6px rgba(37, 99, 235, 0.5); display: flex; align-items: center; justify-content: center; color: white; font-size: 10px; font-weight: 600; animation: placeDrop 0.2s ease-out; white-space: nowrap; overflow: hidden; z-index: 10; }
  .overlay-panel { background: rgba(37, 99, 235, 0.05); border: 1.5px dashed rgba(37, 99, 235, 0.4); animation: fadeIn 0.3s ease-out; z-index: 9; }
  .overlay-panel-label { position: absolute; top: 3px; left: 6px; font-size: 9px; font-weight: 600; color: var(--accent-dark); background: white; padding: 1px 5px; border-radius: 3px; }
  @keyframes placeDrop { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .pdf-controls { position: absolute; top: 16px; right: 16px; display: flex; gap: 6px; background: var(--bg-card); padding: 6px; border-radius: var(--radius-sm); box-shadow: var(--shadow); z-index: 4; }
  .pdf-controls button { width: 34px; height: 34px; background: transparent; border: none; color: var(--text); display: inline-flex; align-items: center; justify-content: center; font-size: 15px; border-radius: 6px; }
  .pdf-controls button:hover:not(:disabled) { background: var(--bg-soft); }
  .pdf-controls .zoom-label { padding: 0 8px; align-self: center; font-size: 12px; color: var(--text-muted); font-variant-numeric: tabular-nums; }

  .page-nav { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; background: var(--bg-card); padding: 6px 8px; border-radius: 999px; box-shadow: var(--shadow); z-index: 4; align-items: center; font-size: 13px; }
  .page-nav button { width: 30px; height: 30px; background: transparent; border: none; color: var(--text); display: inline-flex; align-items: center; justify-content: center; font-size: 14px; border-radius: 6px; }
  .page-nav button:hover:not(:disabled) { background: var(--bg-soft); }
  .page-nav-label { padding: 0 8px; font-variant-numeric: tabular-nums; color: var(--text-muted); }

  .sidebar { width: 360px; background: var(--bg-card); border-left: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; padding: 24px; display: flex; flex-direction: column; gap: 20px; }
  .sidebar-title { font-family: var(--serif); font-size: 22px; font-weight: 500; letter-spacing: -0.01em; margin: 0 0 4px; }
  .placed-indicator { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; background: var(--success-soft); color: #15803d; border-radius: 999px; font-size: 12px; font-weight: 600; width: fit-content; max-width: 100%; }
  .placed-indicator.anchor { background: var(--accent-soft); color: var(--accent-dark); }
  .placed-indicator span.word { display: inline-block; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; vertical-align: bottom; font-family: var(--serif); font-style: italic; }
  .sidebar-footer { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
  .secondary-actions { display: flex; gap: 8px; }
  .secondary-actions > * { flex: 1; }

  .compat-notice { background: #fffbeb; border: 1px solid #fde68a; color: #78350f; padding: 10px 12px; border-radius: 8px; font-size: 12px; line-height: 1.5; }
  .compat-notice b { color: #422006; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); padding: 12px 20px; border-radius: 999px; font-size: 14px; font-weight: 500; box-shadow: var(--shadow-lg); z-index: 100; animation: toastIn 0.2s ease-out; }
  @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 10px); } to { opacity: 1; transform: translate(-50%, 0); } }
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2.5px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 900px) {
    .editor-body { flex-direction: column; overflow-y: auto; }
    .pdf-area { min-height: 55vh; max-height: 55vh; padding: 12px; }
    .sidebar { width: 100%; border-left: none; border-top: 1px solid var(--border); padding: 20px 18px; gap: 16px; }
    .sidebar-footer { position: sticky; bottom: 0; background: var(--bg-card); margin: 0 -18px -20px; padding: 14px 18px; border-top: 1px solid var(--border); }
    .brand-name { display: none; }
    .editor-top { padding: 10px 12px; }
    .editor-file-name { font-size: 14px; }
    .pdf-controls { top: 10px; right: 10px; }
    .pdf-controls button { width: 32px; height: 32px; }
    .page-nav { bottom: 10px; }
    .upload-title { font-size: 32px; }
    .list-title { font-size: 26px; }
    .file-row { padding: 10px 12px; gap: 10px; }
    .file-meta { display: none; }
  }
  @media (max-width: 500px) {
    .stats-row { gap: 6px; }
    .stat { padding: 6px 10px; font-size: 12px; }
    .secondary-actions { flex-direction: column; }
    .secondary-actions > * { width: 100%; }
  }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 10px; border: 2px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-subtle); }
</style>

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// =========================================================================
// API
// =========================================================================
const API = "";
const api = {
  upload: async (files) => {
    const fd = new FormData();
    for (const f of files) fd.append("files", f);
    const r = await fetch(`${API}/api/files/upload`, { method: "POST", body: fd });
    if (!r.ok) throw new Error("Upload failed");
    return r.json();
  },
  list: async (p = {}) => {
    const qs = new URLSearchParams(Object.fromEntries(Object.entries(p).filter(([, v]) => v))).toString();
    return (await fetch(`${API}/api/files${qs ? "?" + qs : ""}`)).json();
  },
  stats: async () => (await fetch(`${API}/api/files/stats`)).json(),
  get: async (id) => (await fetch(`${API}/api/files/${id}`)).json(),
  updateConfig: async (id, cfg) => (await fetch(`${API}/api/files/${id}/config`, {
    method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(cfg),
  })).json(),
  skip: async (id) => fetch(`${API}/api/files/${id}/skip`, {
    method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ skip: true }),
  }),
  bulkDelete: async (ids) => fetch(`${API}/api/files/bulk-delete`, {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ file_ids: ids, config: {} }),
  }),
  reset: async () => fetch(`${API}/api/reset`, { method: "POST" }),
  previewUrl: (id) => `${API}/api/files/${id}/preview`,
  downloadUrl: (id) => `${API}/api/files/${id}/download`,
  downloadAllUrl: () => `${API}/api/download-all`,
};

// =========================================================================
// Layout math — MUST match backend processing.py exactly
// =========================================================================
function tabSize(label) {
  const s = label || "Show details";
  return { w: Math.max(60, Math.min(160, s.length * 7 + 20)), h: 26 };
}

function computeLayout(clickX, clickY, pageW, pageH, label, panelHHint = 130) {
  const { w: tw, h: tabH } = tabSize(label);
  const tabW = Math.min(tw, pageW - 40);
  const panelW = Math.min(pageW - 40, 420);
  const panelH = Math.min(panelHHint, pageH - tabH - 60);
  let tabX = clickX - tabW / 2, tabY = clickY - tabH / 2;
  tabX = Math.max(20, Math.min(pageW - tabW - 20, tabX));
  tabY = Math.max(20, Math.min(pageH - tabH - 20, tabY));
  let panelX = tabX + tabW / 2 - panelW / 2;
  panelX = Math.max(20, Math.min(pageW - panelW - 20, panelX));
  let panelY = tabY + tabH + 10;
  if (panelY + panelH > pageH - 20) panelY = Math.max(20, tabY - panelH - 10);
  return { tabX, tabY, tabW, tabH, panelX, panelY, panelW, panelH };
}

// =========================================================================
// Toast
// =========================================================================
const ToastCtx = React.createContext(() => {});
function ToastHost({ children }) {
  const [msg, setMsg] = useState(null);
  const show = useCallback(m => { setMsg(m); setTimeout(() => setMsg(null), 2000); }, []);
  return <ToastCtx.Provider value={show}>{children}{msg && <div className="toast">{msg}</div>}</ToastCtx.Provider>;
}
const useToast = () => React.useContext(ToastCtx);

// =========================================================================
// PDF Preview with word-accurate click via pdf.js getTextContent
// =========================================================================
function PdfPreview({ fileId, pageIndex, onPageChange, onWordClick, onEmptyClick, tabClick, tabLabel, selectedWordKey, needsClick }) {
  const canvasRef = useRef(null);
  const wrapperRef = useRef(null);
  const textLayerRef = useRef(null);
  const [fitScale, setFitScale] = useState(1);
  const [zoom, setZoom] = useState(1);
  const [dims, setDims] = useState({ w: 0, h: 0, pdfW: 612, pdfH: 792 });
  const [numPages, setNumPages] = useState(1);
  const [loading, setLoading] = useState(true);
  const renderTaskRef = useRef(null);
  const docRef = useRef(null);

  useEffect(() => {
    if (!fileId) return;
    let cancelled = false;
    setLoading(true);
    docRef.current = null;
    (async () => {
      try {
        const pdf = await pdfjsLib.getDocument(api.previewUrl(fileId)).promise;
        if (cancelled) return;
        docRef.current = pdf;
        setNumPages(pdf.numPages);
        onPageChange && onPageChange({ numPages: pdf.numPages });
        renderPage();
      } catch (e) { console.error(e); setLoading(false); }
    })();
    return () => { cancelled = true; };
  }, [fileId]);

  const renderPage = useCallback(async () => {
    const pdf = docRef.current;
    if (!pdf || !canvasRef.current || !wrapperRef.current) return;
    try {
      const idx = Math.min(pageIndex, pdf.numPages - 1);
      const page = await pdf.getPage(idx + 1);
      const baseVp = page.getViewport({ scale: 1 });

      const area = wrapperRef.current.parentElement;
      const availW = area.clientWidth - 40;
      const availH = area.clientHeight - 40;
      const fit = Math.min(availW / baseVp.width, availH / baseVp.height, 1.8);
      const actualScale = fit * zoom;
      const viewport = page.getViewport({ scale: actualScale });

      const canvas = canvasRef.current;
      const dpr = window.devicePixelRatio || 1;
      canvas.width = viewport.width * dpr;
      canvas.height = viewport.height * dpr;
      canvas.style.width = viewport.width + "px";
      canvas.style.height = viewport.height + "px";
      const ctx = canvas.getContext("2d");
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      if (renderTaskRef.current) { try { renderTaskRef.current.cancel(); } catch {} }
      const rt = page.render({ canvasContext: ctx, viewport });
      renderTaskRef.current = rt;
      await rt.promise;

      // Build text layer using pdf.js-native per-item positioning.
      // For word-level clicks we split each item's text on whitespace and size
      // each word proportionally by character count (good enough for UI clicks).
      const tl = textLayerRef.current;
      if (tl) {
        tl.innerHTML = "";
        tl.style.width = viewport.width + "px";
        tl.style.height = viewport.height + "px";

        try {
          const textContent = await page.getTextContent({ disableCombineTextItems: true });

          for (let itemIdx = 0; itemIdx < textContent.items.length; itemIdx++) {
            const item = textContent.items[itemIdx];
            if (!item.str || !item.str.trim()) continue;

            // Use pdf.js's own matrix math for accurate positioning.
            // tx = viewport.transform × item.transform
            const tx = pdfjsLib.Util.transform(viewport.transform, item.transform);
            // tx[4] = left on canvas, tx[5] = baseline on canvas
            const fontHeight = Math.hypot(tx[2], tx[3]);
            const screenLeft = tx[4];
            const screenTop = tx[5] - fontHeight;
            const screenWidth = item.width * actualScale;

            // Split into per-word spans
            const parts = item.str.split(/(\s+)/);
            const totalChars = item.str.length;
            let charsConsumed = 0;

            for (let partIdx = 0; partIdx < parts.length; partIdx++) {
              const part = parts[partIdx];
              const partChars = part.length;
              const partFraction = partChars / totalChars;
              const partScreenWidth = screenWidth * partFraction;
              const partScreenLeft = screenLeft + (charsConsumed / totalChars) * screenWidth;
              charsConsumed += partChars;

              if (!part.trim()) continue; // whitespace: skip span but advance cursor

              const span = document.createElement("span");
              span.textContent = part;
              span.style.left = partScreenLeft + "px";
              span.style.top = screenTop + "px";
              span.style.fontSize = fontHeight + "px";
              span.style.width = partScreenWidth + "px";
              span.style.height = fontHeight + "px";

              const wordKey = `${itemIdx}:${partIdx}`;
              span.dataset.wordKey = wordKey;
              if (wordKey === selectedWordKey) span.classList.add("selected");

              // PDF coords for this word
              const pdfLeftX = item.transform[4] + (charsConsumed - partChars) / totalChars * item.width;
              const pdfRightX = pdfLeftX + item.width * partFraction;
              const pdfBaseY = item.transform[5];
              const pdfH = Math.hypot(item.transform[2], item.transform[3]);
              const pdfCenterY = pdfBaseY + pdfH / 2;

              span.onclick = (e) => {
                e.stopPropagation();
                onWordClick && onWordClick({
                  wordRightX: pdfRightX,
                  wordCenterY: pdfCenterY,
                  wordKey, word: part.trim(),
                });
              };

              tl.appendChild(span);
            }
          }
        } catch (e) { console.warn("text layer error", e); }
      }

      setFitScale(fit);
      setDims({ w: viewport.width, h: viewport.height, pdfW: baseVp.width, pdfH: baseVp.height });
      setLoading(false);
    } catch (e) {
      if (e.name !== "RenderingCancelledException") { console.error(e); setLoading(false); }
    }
  }, [pageIndex, zoom, selectedWordKey]);

  useEffect(() => { renderPage(); }, [pageIndex, zoom, renderPage]);

  useEffect(() => {
    const tl = textLayerRef.current;
    if (!tl) return;
    tl.querySelectorAll("span").forEach(el => {
      el.classList.toggle("selected", el.dataset.wordKey === selectedWordKey);
    });
  }, [selectedWordKey]);

  useEffect(() => {
    const onResize = () => renderPage();
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, [renderPage]);

  const handleCanvasClick = (e) => {
    if (!canvasRef.current || !dims.w) return;
    if (e.target !== canvasRef.current) return;
    const rect = canvasRef.current.getBoundingClientRect();
    const cx = e.clientX - rect.left, cy = e.clientY - rect.top;
    const s = fitScale * zoom;
    onEmptyClick && onEmptyClick({ x: cx / s, y: (dims.h - cy) / s });
  };

  // Overlay render (tab preview + panel preview)
  let overlay = null;
  if (tabClick && dims.pdfW) {
    const s = fitScale * zoom;
    const layout = computeLayout(tabClick.x, tabClick.y, dims.pdfW, dims.pdfH, tabLabel);
    const css = (r) => ({
      position: "absolute",
      left: r.x * s,
      top: (dims.pdfH - (r.y + r.h)) * s,
      width: r.w * s,
      height: r.h * s,
    });
    overlay = (
      <>
        <div className="overlay overlay-panel" style={css({ x: layout.panelX, y: layout.panelY, w: layout.panelW, h: layout.panelH })}>
          <div className="overlay-panel-label">Hidden text</div>
        </div>
        <div className="overlay overlay-tab" style={css({ x: layout.tabX, y: layout.tabY, w: layout.tabW, h: layout.tabH })}>
          {tabLabel || "Show details"}
        </div>
      </>
    );
  }

  return (
    <>
      <div className="pdf-controls">
        <button onClick={() => setZoom(z => Math.max(0.5, +(z - 0.25).toFixed(2)))} disabled={zoom <= 0.5}>−</button>
        <div className="zoom-label">{Math.round(fitScale * zoom * 100)}%</div>
        <button onClick={() => setZoom(z => Math.min(3, +(z + 0.25).toFixed(2)))} disabled={zoom >= 3}>+</button>
        <button onClick={() => setZoom(1)} title="Fit to screen" style={{ fontSize: 13 }}>⤢</button>
      </div>

      {needsClick && !loading && (
        <div className="instruction-banner">👇 Tap any word to pin the tab next to it</div>
      )}

      <div ref={wrapperRef} className="pdf-frame" style={{ opacity: loading ? 0.4 : 1 }}>
        <canvas ref={canvasRef} onClick={handleCanvasClick} />
        <div ref={textLayerRef} className="text-layer" />
        {overlay}
        {loading && <div className="pdf-loading"><div className="spinner" /></div>}
      </div>

      {numPages > 1 && (
        <div className="page-nav">
          <button onClick={() => onPageChange({ pageIndex: Math.max(0, pageIndex - 1) })} disabled={pageIndex === 0}>‹</button>
          <span className="page-nav-label">Page {pageIndex + 1} of {numPages}</span>
          <button onClick={() => onPageChange({ pageIndex: Math.min(numPages - 1, pageIndex + 1) })} disabled={pageIndex >= numPages - 1}>›</button>
        </div>
      )}
    </>
  );
}

// =========================================================================
// Upload
// =========================================================================
function UploadScreen({ onDone, initialFiles }) {
  const [dragging, setDragging] = useState(false);
  const [uploading, setUploading] = useState(false);
  const [prog, setProg] = useState({ done: 0, total: 0 });
  const inputRef = useRef(null);
  const toast = useToast();

  const doUpload = async (fileList) => {
    const files = Array.from(fileList).filter(f => /\.(pdf|docx)$/i.test(f.name));
    if (!files.length) { toast("No PDF or Word files found"); return; }
    setUploading(true);
    setProg({ done: 0, total: files.length });
    for (let i = 0; i < files.length; i += 10) {
      try { await api.upload(files.slice(i, i + 10)); } catch (e) { console.error(e); }
      setProg({ done: Math.min(i + 10, files.length), total: files.length });
    }
    setUploading(false);
    toast(`Added ${files.length} file${files.length === 1 ? "" : "s"}`);
    onDone();
  };

  return (
    <div className="upload-page">
      <div className="upload-hero">
        <h1 className="upload-title">Add a <em>hidden tab</em><br/>to your documents</h1>
        <p className="upload-sub">Upload your files, click on a word, type what should appear. Done.</p>
      </div>
      <div
        className={"drop-zone" + (dragging ? " dragging" : "")}
        onClick={() => !uploading && inputRef.current.click()}
        onDragOver={(e) => { e.preventDefault(); setDragging(true); }}
        onDragLeave={() => setDragging(false)}
        onDrop={(e) => { e.preventDefault(); setDragging(false); doUpload(e.dataTransfer.files); }}
      >
        {uploading ? (
          <>
            <div className="drop-icon"><div className="spinner" style={{ width: 32, height: 32 }} /></div>
            <div className="drop-heading">Uploading {prog.done} of {prog.total}...</div>
            <div className="drop-sub">Word docs take a few seconds each to convert</div>
          </>
        ) : (
          <>
            <div className="drop-icon">📁</div>
            <div className="drop-heading">Drop files here or tap to choose</div>
            <div className="drop-sub">PDF and Word · Up to hundreds of files</div>
          </>
        )}
        <input ref={inputRef} type="file" multiple accept=".pdf,.docx" style={{ display: "none" }} onChange={(e) => doUpload(e.target.files)} />
      </div>
      <div className="help-note">
        <b>Important:</b> the finished PDFs need to be opened in <b>Adobe Acrobat Reader</b> (free) for the click-to-toggle to work. Mac Preview, iPhone Files, and web browser PDF viewers don't run PDF JavaScript — the hidden text stays hidden, but clicking the tab won't reveal it.
      </div>
      {initialFiles > 0 && (
        <div style={{ marginTop: 16, textAlign: "center" }}>
          <button className="btn-ghost" onClick={onDone}>← Back to my {initialFiles} files</button>
        </div>
      )}
    </div>
  );
}

// =========================================================================
// List
// =========================================================================
function FileListScreen({ files, stats, onEdit, onUpload, onRefresh, onReset }) {
  const [search, setSearch] = useState("");
  const [selected, setSelected] = useState(new Set());
  const toast = useToast();

  const filtered = useMemo(() =>
    files.filter(f => !search || f.original_name.toLowerCase().includes(search.toLowerCase())),
  [files, search]);

  const firstPending = files.findIndex(f => f.status === "pending" || f.status === "configured");
  const by = stats?.by_status || {};
  const done = by.processed || 0, inProgress = by.configured || 0, pending = by.pending || 0;
  const doneFiles = files.filter(f => f.status === "processed");

  const toggleSel = (id) => setSelected(p => { const n = new Set(p); n.has(id) ? n.delete(id) : n.add(id); return n; });
  const bulkDel = async () => {
    if (!selected.size || !confirm(`Remove ${selected.size} files?`)) return;
    await api.bulkDelete(Array.from(selected));
    setSelected(new Set());
    await onRefresh();
    toast("Removed");
  };

  // Smart download: 1 file → PDF, 2+ → zip
  const downloadHref = done === 1 && doneFiles[0] ? api.downloadUrl(doneFiles[0].id) : api.downloadAllUrl();
  const downloadLabel = done === 1 ? "↓ Download PDF" : `↓ Download ${done} as zip`;

  const statusText = (s) => ({ pending: "Not started", configured: "Processing…", processed: "Done", error: "Error", skipped: "Skipped" }[s] || s);

  return (
    <div className="list-page">
      <div className="list-header">
        <div>
          <h1 className="list-title">Your documents</h1>
          <div className="list-count">{files.length} file{files.length === 1 ? "" : "s"}</div>
        </div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          <button className="btn-secondary" onClick={onUpload}>＋ Add more</button>
          {done > 0 && <a className="btn-accent" href={downloadHref} style={{ textDecoration: "none", display: "inline-flex", alignItems: "center" }}>{downloadLabel}</a>}
          {firstPending >= 0 && <button className="btn-primary" onClick={() => onEdit(files[firstPending].id)}>{done > 0 ? "Continue →" : "Start →"}</button>}
        </div>
      </div>
      <div className="stats-row">
        {pending > 0 && <div className="stat"><span className="stat-dot dot-pending"/> {pending} to do</div>}
        {inProgress > 0 && <div className="stat"><span className="stat-dot dot-processing"/> {inProgress} processing</div>}
        {done > 0 && <div className="stat"><span className="stat-dot dot-done"/> {done} done</div>}
        {by.error > 0 && <div className="stat"><span className="stat-dot dot-error"/> {by.error} error</div>}
      </div>
      <div className="toolbar">
        <div className="search-wrap">
          <span className="search-icon">🔍</span>
          <input className="input" placeholder="Search files..." value={search} onChange={e => setSearch(e.target.value)} />
        </div>
        {selected.size > 0 && <button className="btn-secondary" onClick={bulkDel} style={{ color: "#991b1b", borderColor: "#fca5a5" }}>Remove {selected.size}</button>}
      </div>
      {files.length === 0 ? (
        <div className="file-grid" style={{ padding: 40, textAlign: "center" }}>
          <div style={{ fontSize: 40, marginBottom: 10 }}>📭</div>
          <div style={{ fontWeight: 600, marginBottom: 6 }}>No files yet</div>
          <button className="btn-primary" onClick={onUpload} style={{ marginTop: 10 }}>＋ Upload</button>
        </div>
      ) : (
        <div className="file-grid">
          {filtered.map(f => (
            <div key={f.id} className={"file-row" + (f.status === "processed" ? " done" : "")} onClick={() => onEdit(f.id)}>
              <div className={"file-check" + (selected.has(f.id) ? " checked" : "")} onClick={(e) => { e.stopPropagation(); toggleSel(f.id); }}>
                {selected.has(f.id) && "✓"}
              </div>
              <span className="file-icon">{f.kind === "docx" ? "📝" : "📄"}</span>
              <div className="file-info">
                <div className="file-name" title={f.original_name}>{f.original_name}</div>
                <div className="file-meta">{f.page_count} page{f.page_count === 1 ? "" : "s"}</div>
              </div>
              <span className={"file-status status-" + f.status}>{statusText(f.status)}</span>
              {f.has_processed && (
                <a className="file-dl-btn" href={api.downloadUrl(f.id)} onClick={e => e.stopPropagation()} title="Download this PDF">↓</a>
              )}
            </div>
          ))}
        </div>
      )}
      {files.length > 0 && (
        <div style={{ marginTop: 24, display: "flex", justifyContent: "flex-end" }}>
          <button className="btn-ghost" onClick={onReset} style={{ color: "#991b1b" }}>Reset everything</button>
        </div>
      )}
    </div>
  );
}

// =========================================================================
// Editor
// =========================================================================
function EditorScreen({ files, currentId, onNavigate, onBack, onRefresh }) {
  const toast = useToast();
  const [file, setFile] = useState(null);
  const [cfg, setCfg] = useState(null);
  const [saving, setSaving] = useState(false);
  const anchorTimerRef = useRef(null);

  const currentIdx = files.findIndex(f => f.id === currentId);
  const total = files.length;

  useEffect(() => {
    if (!currentId) return;
    let cancelled = false;
    api.get(currentId).then(f => {
      if (cancelled) return;
      setFile(f);
      setCfg(f.config || {
        page_index: 0, click_x: null, click_y: null,
        tab_label: "Show details", hidden_text: "",
        anchor_word: null, anchor_word_key: null,
        anchor_right_x: null, anchor_center_y: null,
      });
    });
    return () => { cancelled = true; };
  }, [currentId]);

  // Default placement at bottom-center on first open
  useEffect(() => {
    if (!file || !cfg) return;
    if (cfg.click_x == null && file.page_sizes?.length) {
      const [w] = file.page_sizes[cfg.page_index || 0] || [612];
      setCfg(c => ({ ...c, click_x: w / 2, click_y: 60 }));
    }
  }, [file, cfg?.page_index]);

  // When label changes AND tab is anchored to a word, re-compute tab center X
  // so the tab stays pinned to the right of the word.
  useEffect(() => {
    if (!cfg || cfg.anchor_right_x == null) return;
    const { w: tabW } = tabSize(cfg.tab_label);
    const newX = cfg.anchor_right_x + 6 + tabW / 2;
    if (Math.abs((cfg.click_x || 0) - newX) > 0.5) {
      setCfg(c => ({ ...c, click_x: newX }));
    }
  }, [cfg?.tab_label, cfg?.anchor_right_x]);

  const updateCfg = (patch) => setCfg(prev => ({ ...prev, ...patch }));

  const pageW = file?.page_sizes?.[cfg?.page_index || 0]?.[0] || 612;
  const pageH = file?.page_sizes?.[cfg?.page_index || 0]?.[1] || 792;

  const saveAndNext = async () => {
    if (!cfg) return;
    const final = { ...cfg };
    if (final.click_x == null) { final.click_x = pageW / 2; final.click_y = 60; }
    setSaving(true);
    try {
      await api.updateConfig(currentId, final);
      onRefresh();
      toast("Saved ✓");
      const next = files[currentIdx + 1];
      if (next) onNavigate(next.id);
      else { toast("All done!"); onBack(); }
    } catch (e) { toast("Save failed"); } finally { setSaving(false); }
  };

  const skip = async () => {
    await api.skip(currentId);
    onRefresh();
    const next = files[currentIdx + 1];
    if (next) onNavigate(next.id); else onBack();
  };

  const copyFromPrev = () => {
    const prev = files[currentIdx - 1];
    if (prev?.config) {
      const { page_index, ...rest } = prev.config;
      updateCfg({ ...rest, anchor_word: null, anchor_word_key: null, anchor_right_x: null, anchor_center_y: null });
      toast("Copied from previous");
    }
  };

  useEffect(() => {
    const h = (e) => {
      const t = document.activeElement?.tagName;
      if (t === "INPUT" || t === "TEXTAREA") return;
      if (e.key === "Escape") onBack();
      else if (e.key === "Enter") { e.preventDefault(); saveAndNext(); }
      else if (e.key === "ArrowRight") { const n = files[currentIdx + 1]; if (n) onNavigate(n.id); }
      else if (e.key === "ArrowLeft") { const p = files[currentIdx - 1]; if (p) onNavigate(p.id); }
    };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, [currentIdx, files, cfg, saving]);

  if (!file || !cfg) return <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center" }}><div className="spinner" /></div>;

  const processedCount = files.filter(f => f.status === "processed").length;
  const progressPct = processedCount / total * 100;
  const hasPlacement = cfg.click_x != null;
  const isAnchored = !!cfg.anchor_word;

  const handleWordClick = ({ wordRightX, wordCenterY, word, wordKey }) => {
    const { w: tabW } = tabSize(cfg.tab_label);
    updateCfg({
      click_x: wordRightX + 6 + tabW / 2,
      click_y: wordCenterY,
      anchor_word: word,
      anchor_word_key: wordKey,
      anchor_right_x: wordRightX,
      anchor_center_y: wordCenterY,
    });
  };

  const handleEmptyClick = ({ x, y }) => {
    updateCfg({
      click_x: x, click_y: y,
      anchor_word: null, anchor_word_key: null,
      anchor_right_x: null, anchor_center_y: null,
    });
  };

  return (
    <div className="editor">
      <div className="editor-top">
        <button className="btn-ghost" onClick={onBack}>← Back</button>
        <div className="editor-file">
          <div className="editor-file-name" title={file.original_name}>{file.original_name}</div>
          <div className="editor-progress">File {currentIdx + 1} of {total} · {processedCount} done</div>
          <div className="progress-thin"><div style={{ width: progressPct + "%" }} /></div>
        </div>
        <button className="btn-icon" onClick={() => { const p = files[currentIdx - 1]; if (p) onNavigate(p.id); }} disabled={currentIdx === 0} title="Previous">‹</button>
        <button className="btn-icon" onClick={() => { const n = files[currentIdx + 1]; if (n) onNavigate(n.id); }} disabled={currentIdx >= total - 1} title="Next">›</button>
      </div>

      <div className="editor-body">
        <div className="pdf-area">
          <PdfPreview
            fileId={file.id}
            pageIndex={cfg.page_index || 0}
            onPageChange={(x) => { if (x.pageIndex != null) updateCfg({ page_index: x.pageIndex, anchor_word: null, anchor_word_key: null, anchor_right_x: null, anchor_center_y: null }); }}
            onWordClick={handleWordClick}
            onEmptyClick={handleEmptyClick}
            tabClick={hasPlacement ? { x: cfg.click_x, y: cfg.click_y } : null}
            tabLabel={cfg.tab_label}
            selectedWordKey={cfg.anchor_word_key}
            needsClick={!hasPlacement}
          />
        </div>

        <div className="sidebar">
          <div>
            <h2 className="sidebar-title">Tab details</h2>
            {isAnchored ? (
              <div className="placed-indicator anchor">📌 Pinned to <span className="word">"{cfg.anchor_word}"</span></div>
            ) : hasPlacement ? (
              <div className="placed-indicator">✓ Tab placed · click a word to pin it</div>
            ) : null}
          </div>

          <div>
            <label className="label">Button text</label>
            <input className="input" value={cfg.tab_label} onChange={e => updateCfg({ tab_label: e.target.value })} placeholder="Show details" />
          </div>

          <div>
            <label className="label">Hidden message (shown when tab is clicked)</label>
            <textarea className="textarea" value={cfg.hidden_text} onChange={e => updateCfg({ hidden_text: e.target.value })} placeholder="Type what should appear..." />
          </div>

          {currentIdx > 0 && (
            <button className="btn-ghost" onClick={copyFromPrev} style={{ alignSelf: "flex-start", paddingLeft: 0 }}>↺ Copy from previous file</button>
          )}

          <div className="compat-notice">
            <b>Note:</b> the interactive tab works in <b>Adobe Acrobat Reader</b> (free). In Mac Preview or browsers the hidden text stays hidden, but the click-to-toggle won't work.
          </div>

          {file.error_msg && (
            <div style={{ background: "#fef2f2", border: "1px solid #fecaca", borderRadius: 10, padding: 12, fontSize: 13, color: "#991b1b" }}>
              <b>Problem:</b> {file.error_msg}
            </div>
          )}

          <div className="sidebar-footer">
            <button className="btn-primary" onClick={saveAndNext} disabled={saving} style={{ width: "100%" }}>
              {saving ? "Saving..." : (currentIdx < total - 1 ? "Save and continue →" : "Save and finish")}
            </button>
            <div className="secondary-actions">
              <button className="btn-secondary" onClick={skip}>Skip this</button>
              <button className="btn-secondary" onClick={onBack}>Back to list</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// =========================================================================
// App
// =========================================================================
function App() {
  const [phase, setPhase] = useState("loading");
  const [files, setFiles] = useState([]);
  const [stats, setStats] = useState(null);
  const [currentId, setCurrentId] = useState(null);

  const refresh = useCallback(async () => {
    const [fl, st] = await Promise.all([api.list(), api.stats()]);
    setFiles(fl.files || []);
    setStats(st);
    return fl.files || [];
  }, []);

  useEffect(() => { refresh().then(fs => setPhase(fs.length === 0 ? "upload" : "list")); }, []);
  useEffect(() => {
    if (!files.some(f => f.status === "configured")) return;
    const i = setInterval(refresh, 1500);
    return () => clearInterval(i);
  }, [files]);

  const goEdit = (id) => { setCurrentId(id); setPhase("editor"); };
  const resetAll = async () => {
    if (!confirm("Delete all files and start over? This can't be undone.")) return;
    await api.reset();
    await refresh();
    setPhase("upload");
  };

  return (
    <ToastHost>
      <div className="topbar">
        <div className="brand">
          <div className="brand-mark">T</div>
          <div className="brand-name">Tab Builder</div>
        </div>
        {phase !== "loading" && phase !== "editor" && (
          <div style={{ display: "flex", gap: 8 }}>
            {phase !== "list" && files.length > 0 && <button className="btn-ghost" onClick={() => setPhase("list")}>My files</button>}
            {phase !== "upload" && <button className="btn-ghost" onClick={() => setPhase("upload")}>＋ Upload</button>}
          </div>
        )}
      </div>
      {phase === "loading" && <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center" }}><div className="spinner" /></div>}
      {phase === "upload" && <UploadScreen onDone={async () => { const fs = await refresh(); setPhase(fs.length === 0 ? "upload" : "list"); }} initialFiles={files.length} />}
      {phase === "list" && <FileListScreen files={files} stats={stats} onEdit={goEdit} onUpload={() => setPhase("upload")} onRefresh={refresh} onReset={resetAll} />}
      {phase === "editor" && currentId && <EditorScreen files={files} currentId={currentId} onNavigate={setCurrentId} onBack={async () => { await refresh(); setPhase("list"); }} onRefresh={refresh} />}
    </ToastHost>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
